<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COTTONTAiL-extension</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <header>
    <span class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
        <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/>
      </svg>
      COTTONTAiL-extension
    </span>
    <nav class="tabs">
      <button class="tab active" data-tab="search">Search</button>
      <button class="tab"        data-tab="cookies">Cookies</button>
    </nav>
  </header>

  <!-- ── Search Tab ──────────────────────────────────────────────────────── -->
  <section class="tab-panel active" id="tab-search">

    <!-- Log context banner -->
    <div class="context-bar" id="context-bar">
      <span class="context-icon">📋</span>
      <span class="context-name" id="context-name">No log item selected</span>
      <button class="context-clear" id="context-clear" title="Clear" hidden>✕</button>
    </div>

    <!-- Manual entry row — shown when no context was pushed from the logs page -->
    <div class="manual-row" id="manual-row">
      <input
        type="number"
        id="manual-msgid"
        class="input"
        placeholder="Paste msg_id (e.g. 1234)"
        min="1"
        style="width:160px;flex-shrink:0"
      />
      <input
        type="text"
        id="manual-filename"
        class="input"
        placeholder="File name (for search pre-fill)"
        style="flex:1"
      />
      <button class="btn-secondary" id="manual-set-btn">Set</button>
    </div>

    <!-- Search controls -->
    <div class="search-row">
      <input
        type="text"
        id="search-input"
        class="input"
        placeholder="Search DrunkenSlug…"
        autocomplete="off"
        spellcheck="false"
      />
      <select id="cat-select" class="select" title="Category filter">
        <option value="-1">All</option>
        <option value="6000" selected>XXX</option>
        <option value="6040">XXX HD</option>
        <option value="6045">XXX UHD</option>
        <option value="6080">XXX SD</option>
        <option value="6010">XXX DVD</option>
        <option value="6050">XXX VR</option>
        <option value="6070">XXX Packs</option>
        <option value="2000">Movies</option>
        <option value="5000">TV</option>
      </select>
      <button class="btn-primary" id="search-btn">Go</button>
    </div>

    <!-- Status / error bar -->
    <div class="status-bar" id="status-bar" hidden></div>

    <!-- Results grid -->
    <div class="results-wrap" id="results-wrap">
      <div class="results-empty" id="results-empty">
        Search results will appear here.
      </div>
      <div class="results-grid" id="results-grid"></div>
    </div>

    <!-- Save action bar (appears when thumbnail + context are both set) -->
    <div class="save-bar" id="save-bar" hidden>
      <div class="save-bar-info">
        <span class="save-bar-label" id="save-bar-label">Selected thumbnail</span>
        <span class="save-bar-target" id="save-bar-target"></span>
      </div>
      <button class="btn-primary" id="save-btn">Save to Log Entry</button>
    </div>

  </section>

  <!-- ── Cookies Tab ─────────────────────────────────────────────────────── -->
  <section class="tab-panel" id="tab-cookies">
    <div class="cookies-form">
      <label class="label" for="cookie-input">
        Paste DrunkenSlug cookies (Netscape / cookies.txt format)
      </label>
      <textarea
        id="cookie-input"
        class="textarea"
        rows="10"
        spellcheck="false"
        placeholder="# Netscape HTTP Cookie File&#10;# Generated by …&#10;.drunkenslug.com	TRUE	/	TRUE	0	XSRF-TOKEN	eyJ…&#10;.drunkenslug.com	TRUE	/	TRUE	0	drunkenslug_session	eyJ…"
      ></textarea>
      <div class="cookies-hint">
        Export from <strong>Get cookies.txt LOCALLY</strong> or any cookies.txt extension
        while logged in to <a href="https://drunkenslug.com" target="_blank">drunkenslug.com</a>.
        Saved locally in extension storage only.
      </div>
      <div class="cookie-actions">
        <span class="cookie-status" id="cookie-status"></span>
        <button class="btn-primary" id="save-cookies-btn">Save Cookies</button>
      </div>
    </div>
  </section>

  <script type="module" src="popup.ts"></script>
</body>
</html>
